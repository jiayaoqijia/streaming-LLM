<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>streaming-LLM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="scanline-overlay"></div>
  <div class="app-container">
    <header class="header">
      <div class="header-bar">
        <div class="terminal-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <h1 class="title" data-text="streaming-LLM">streaming-LLM</h1>
        <div class="cost-counter">
          <span class="cost-label">COST</span>
          <span class="cost-value" id="cost-value">$0.000000</span>
        </div>
      </div>
    </header>

    <main class="chat-area" id="chat-area">
      <!-- messages appear here -->
    </main>

    <div class="input-area">
      <div class="input-controls">
        <div class="provider-selector">
          <button class="provider-btn active" data-provider="openrouter">OpenRouter</button>
          <button class="provider-btn" data-provider="altllm">AltLLM</button>
        </div>
        <select id="model-select" class="model-select">
          <option value="">Select model...</option>
        </select>
      </div>
      <div class="input-row">
        <textarea id="message-input" class="message-input" placeholder="Send a message..." rows="1"></textarea>
        <button id="send-btn" class="send-btn">SEND</button>
      </div>
    </div>

    <footer class="footer">
      <a href="/terms.html">Terms of Service</a>
      <span class="footer-sep">|</span>
      <a href="/privacy.html">Privacy Policy</a>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
